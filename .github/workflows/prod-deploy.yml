name: Prod Deployment
on: 
  - push
  - workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4.2.2
      - name: send notification
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            channel: deployments
            text: "*Nagarjuna CRM API Prod* Deployment started"
      - name: docker login
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ vars.DOCKER_USERNAME}}
          password: ${{ secrets.DOCKER_PASSWORD}}
      - name: build image
        run: |
          docker build -t ${{ vars.DOCKER_USERNAME}}/nag-prod-crm-be:latest .
      - name: docker push
        run: |
          docker image tag ${{ vars.DOCKER_USERNAME}}/nag-prod-crm-be:latest ${{ vars.DOCKER_USERNAME}}/nag-prod-crm-be:$GITHUB_RUN_NUMBER
          docker push ${{ vars.DOCKER_USERNAME}}/nag-prod-crm-be:$GITHUB_RUN_NUMBER
          docker push ${{ vars.DOCKER_USERNAME}}/nag-prod-crm-be:latest

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: create network
        run: |
          if docker network ls --format '{{ .Name }}' | grep -wq nagcrm-network; then
            echo "nagcrm-network exist"
          else
            docker network create nagcrm-network
          fi
      - name: run the container
        run: |
          if docker ps -a --format '{{ .Names }}' | grep -wq nag-prod-crm-be; then
            echo "container exist removing it and recreating new one"
            docker container rm -f nag-prod-crm-be
            docker rmi ${{ vars.DOCKER_USERNAME}}/nag-prod-crm-be:latest || true
            docker container run -dt --name nag-prod-crm-be --restart always -p 3011:3000 --network nagcrm-network ${{ vars.DOCKER_USERNAME}}/nag-prod-crm-be:latest
          else
            docker container run -dt --name nag-prod-crm-be --restart always -p 3011:3000 --network nagcrm-network ${{ vars.DOCKER_USERNAME}}/nag-prod-crm-be:latest
          fi
      - name: Container Status
        run: docker container ls -a
      - name: send notification
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            channel: deployments
            text: "Nagarjuna CRM API Prod Deployment completed"
